services:
  - type: web
    name: watermark-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        value: data/bot.db
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
